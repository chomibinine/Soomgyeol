<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨결 Pro — 하이퍼 로컬 외출 가이드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --good: #4ade80; --moderate: #facc15; --bad: #f97316; --very-bad: #ef4444;
            --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
            --border: rgba(255,255,255,0.07); --text: #f1f5f9; --muted: #64748b; --accent: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(130px); opacity: 0.12; pointer-events: none; transition: background 2s ease; z-index: 0; }
        .orb1 { width: 700px; height: 700px; top: -250px; left: -200px; background: var(--accent); }
        .orb2 { width: 450px; height: 450px; bottom: 50px; right: -150px; background: #818cf8; }

        header { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); background: rgba(10,14,26,0.7); }
        .logo { font-family: 'Gowun Batang', serif; font-size: 1.5rem; letter-spacing: 0.1em; }
        .logo span { color: var(--accent); }

        main { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
        
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-family: 'Gowun Batang', serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 15px; font-weight: 400; }
        
        .search-container { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px; display: flex; gap: 8px; max-width: 600px; margin: 0 auto 20px; }
        .search-container input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: var(--text); font-size: 1rem; outline: none; }
        .btn-geo { background: rgba(56,189,248,0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 14px; padding: 0 15px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; }
        .btn-main { background: var(--accent); color: #0a0e1a; border: none; border-radius: 14px; padding: 12px 25px; font-weight: 700; cursor: pointer; transition: transform 0.2s; white-space: nowrap; }

        .dashboard { display: none; grid-template-columns: 1.5fr 1fr; gap: 20px; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .full-width { grid-column: 1 / -1; }
        
        .ai-message { font-family: 'Gowun Batang', serif; font-size: 1.2rem; line-height: 1.8; color: #e2e8f0; }
        .ai-typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-family: 'Gowun Batang', serif; display: block; }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 5px; }

        #loading { display: none; position: fixed; inset: 0; background: rgba(10,14,26,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }

        @media (max-width: 850px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="bg-orb orb1" id="orb1"></div>
<div class="bg-orb orb2"></div>

<div id="loading">
    <div class="spinner"></div>
    <p id="loadingText" style="font-family:'Gowun Batang';">위치 정보를 분석 중입니다...</p>
</div>

<header>
    <div class="logo">숨결<span>.</span></div>
    <div id="connectionStatus" style="font-size: 0.7rem; color: var(--good);">● System Online</div>
</header>

<main>
    <section class="hero">
        <h1>오늘, <em>나가도</em> 될까요?</h1>
        <div class="search-container">
            <button class="btn-geo" onclick="getGPSLocation()">📍 내 위치</button>
            <input type="text" id="stationInput" placeholder="측정소 또는 동네 이름을 입력하세요">
            <button class="btn-main" onclick="startAnalysis()">분석 시작</button>
        </div>
    </section>

    <div class="dashboard" id="dashboard">
        <div class="card full-width" style="border-color: var(--accent);">
            <div id="apiSourceTag" style="display: inline-block; padding: 4px 10px; background: rgba(56,189,248,0.1); color: var(--accent); border-radius: 10px; font-size: 0.7rem; margin-bottom: 12px; letter-spacing: 0.05em;">AI 분석 리포트</div>
            <div id="aiMsg" class="ai-message">데이터를 수집하고 있습니다...</div>
        </div>

        <div class="card">
            <h2 id="verdictTitle" style="font-family:'Gowun Batang'; margin-bottom: 20px;">지역 정보</h2>
            <div class="stat-grid">
                <div class="stat-item">
                    <span class="stat-val" id="pm25Val">—</span>
                    <span class="stat-lbl">초미세먼지(PM2.5)</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="tempVal">—</span>
                    <span class="stat-lbl">현재 기온</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-family:'Gowun Batang'; margin-bottom: 20px;">기상 디테일</h2>
            <div id="weatherInfo" style="line-height: 2;"></div>
        </div>
    </div>
</main>

<script>
/**
 * ──────────────────────────────────────────────────────────────────────────
 * CONFIG: API 키 설정
 * ──────────────────────────────────────────────────────────────────────────
 */
const VWORLD_API_KEY = "5B0D3660-9AA8-3DEC-BDB4-BE8463D07762"; 
const OWM_API_KEY = "68be8e3e30b8d79dca72993923055020";

let currentLat = 36.4800; // 세종특별자치시 기본 위도
let currentLon = 127.2890; // 세종특별자치시 기본 경도

// Enter 키로 검색 실행
document.getElementById('stationInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') startAnalysis();
});

// GPS 위치 -> 1순위: 브이월드 -> 2순위(백업): OWM 지명 변환
async function getGPSLocation() {
    if (!navigator.geolocation) return alert("GPS를 지원하지 않습니다.");
    
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loadingText').textContent = "현 위치 좌표 스캔 중...";
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
        currentLat = pos.coords.latitude;
        currentLon = pos.coords.longitude;
        
        try {
            // 1순위: [브이월드 API] 좌표를 행정구역 명칭으로 변환
            const vworldUrl = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${currentLon},${currentLat}&format=json&type=both&zipcode=false&simple=false&key=${VWORLD_API_KEY}`;
            const res = await fetch(vworldUrl);
            const data = await res.json();
            
            let addr = "현재 위치";
            if(data.response?.status === "OK") {
                const result = data.response.result[0].structure;
                addr = result.level4L || result.level2 || "현재 위치";
            } else {
                throw new Error("브이월드 도메인 미등록 또는 응답 오류");
            }
            document.getElementById('stationInput').value = addr;
            startAnalysis();
            
        } catch (e) {
            // 2순위: 브이월드 실패 시 [OWM 글로벌 API] 백업 실행
            console.warn("브이월드 호출 실패. OWM으로 지명을 찾습니다.", e);
            try {
                const geoUrl = `https://api.openweathermap.org/geo/1.0/reverse?lat=${currentLat}&lon=${currentLon}&limit=1&appid=${OWM_API_KEY}`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();
                
                let locationName = "현재 위치";
                if (geoData && geoData.length > 0) {
                    locationName = geoData[0].local_names?.ko || geoData[0].name;
                }
                document.getElementById('stationInput').value = locationName;
            } catch (geoErr) {
                document.getElementById('stationInput').value = "현재 위치";
            }
            startAnalysis();
        }
    }, () => {
        alert("위치 권한을 허용해주세요.");
        document.getElementById('loading').style.display = 'none';
    });
}

// 대기질 가져오기 (1순위: 에어코리아 백엔드 -> 2순위: OWM)
async function fetchAirQuality(station) {
    try {
        const res = await fetch(`/api/air?station=${encodeURIComponent(station)}`);
        const data = await res.json();
        if (data.response?.header?.resultCode !== "00") throw new Error("API Syncing...");
        
        const item = data.response.body.items[0];
        return {
            source: "에어코리아 실시간 데이터",
            stationName: item.stationName,
            pm25: item.pm25Value,
            pm10: item.pm10Value,
            o3: item.o3Value,
            time: item.dataTime
        };
    } catch (err) {
        console.warn("에어코리아 지연, 글로벌 데이터로 전환합니다.");
        const res = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${currentLat}&lon=${currentLon}&appid=${OWM_API_KEY}`);
        const data = await res.json();
        const comp = data.list[0].components;
        return {
            source: "글로벌 대기질 예측 모델",
            stationName: station === "현재 위치" ? "현재 위치" : station + " (예측)",
            pm25: comp.pm2_5,
            pm10: comp.pm10,
            o3: comp.o3 || "-",
            time: new Date().toLocaleTimeString()
        };
    }
}

// 날씨 가져오기 (OWM API 사용)
async function fetchWeather() {
    try {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${currentLat}&lon=${currentLon}&appid=${OWM_API_KEY}&units=metric`);
        const data = await res.json();
        return { temp: data.main.temp, humidity: data.main.humidity };
    } catch (e) {
        return { temp: "-", humidity: "-" };
    }
}

async function startAnalysis() {
    const station = document.getElementById('stationInput').value;
    const loading = document.getElementById('loading');
    loading.style.display = 'flex';
    document.getElementById('loadingText').textContent = `${station} 대기 환경 분석 중...`;

    try {
        const air = await fetchAirQuality(station);
        const weather = await fetchWeather();
        renderDashboard(air, weather);
    } catch (e) {
        alert("데이터 수집 중 오류가 발생했습니다.");
    } finally {
        loading.style.display = 'none';
    }
}

function renderDashboard(air, weather) {
    document.getElementById('dashboard').style.display = 'grid';
    document.getElementById('pm25Val').textContent = `${air.pm25}㎍/㎥`;
    document.getElementById('tempVal').textContent = `${weather.temp}°C`;
    document.getElementById('verdictTitle').textContent = air.stationName;
    document.getElementById('apiSourceTag').textContent = `AI 분석 리포트 (기반: ${air.source})`;
    
    document.getElementById('weatherInfo').innerHTML = `
        • 미세먼지(PM10): ${air.pm10}㎍/㎥ <br>
        • 습도: ${weather.humidity}% <br>
        • 오존: ${air.o3}ppm <br>
        • 측정 시각: ${air.time}
    `;

    const color = air.pm25 <= 15 ? '#4ade80' : air.pm25 <= 35 ? '#facc15' : '#f97316';
    document.getElementById('orb1').style.background = color;
    document.getElementById('pm25Val').style.color = color;

    const aiMsgEl = document.getElementById('aiMsg');
    const advice = air.pm25 > 35 ? "외출 시 마스크 착용이 필수적입니다." : "산책하기에 아주 쾌적한 공기 상태입니다.";
    const text = `현재 ${air.stationName}의 기온은 ${weather.temp}°C이며, 초미세먼지 농도는 ${air.pm25}㎍/㎥로 확인됩니다. ${advice}`;
    
    let i = 0;
    aiMsgEl.textContent = "";
    aiMsgEl.classList.add('ai-typing');
    const timer = setInterval(() => {
        if (i < text.length) aiMsgEl.textContent += text[i++];
        else { clearInterval(timer); aiMsgEl.classList.remove('ai-typing'); }
    }, 30);
}
</script>
</body>
</html>
