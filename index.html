<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨결 Pro — 스마트 외출 가이드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* [기존 스타일 유지 및 일부 보정] */
        :root {
            --good: #4ade80; --moderate: #facc15; --bad: #f97316; --very-bad: #ef4444;
            --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
            --border: rgba(255,255,255,0.07); --text: #f1f5f9; --muted: #64748b; --accent: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* Orb Animation */
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(130px); opacity: 0.12; pointer-events: none; transition: background 2s ease; z-index: 0; }
        .orb1 { width: 700px; height: 700px; top: -250px; left: -200px; background: var(--accent); }
        .orb2 { width: 450px; height: 450px; bottom: 50px; right: -150px; background: #818cf8; }

        header { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); background: rgba(10,14,26,0.7); }
        .logo { font-family: 'Gowun Batang', serif; font-size: 1.5rem; letter-spacing: 0.1em; }
        .logo span { color: var(--accent); }

        main { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
        
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-family: 'Gowun Batang', serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 15px; font-weight: 400; }
        
        .search-container { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px; display: flex; gap: 8px; max-width: 600px; margin: 0 auto 20px; }
        .search-container input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: var(--text); font-size: 1rem; outline: none; }
        .btn-geo { background: rgba(56,189,248,0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 14px; padding: 0 15px; cursor: pointer; font-size: 0.8rem; }
        .btn-main { background: var(--accent); color: #0a0e1a; border: none; border-radius: 14px; padding: 12px 25px; font-weight: 700; cursor: pointer; transition: transform 0.2s; }
        .btn-main:active { transform: scale(0.96); }

        /* Dashboard Components */
        .dashboard { display: none; grid-template-columns: 1.5fr 1fr; gap: 20px; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .full-width { grid-column: 1 / -1; }
        
        .ai-message { font-family: 'Gowun Batang', serif; font-size: 1.2rem; line-height: 1.8; color: #e2e8f0; }
        .ai-typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-family: 'Gowun Batang', serif; display: block; }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 5px; }

        /* Loading */
        #loading { display: none; position: fixed; inset: 0; background: rgba(10,14,26,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 850px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="bg-orb orb1" id="orb1"></div>
<div class="bg-orb orb2"></div>

<div id="loading">
    <div class="spinner"></div>
    <p id="loadingText" style="font-family:'Gowun Batang';">현재 위치 분석 중...</p>
</div>

<header>
    <div class="logo">숨결<span>.</span></div>
    <div id="connectionStatus" style="font-size: 0.7rem; color: var(--good);">● System Online</div>
</header>

<main>
    <section class="hero">
        <h1>오늘, <em>나가도</em> 될까요?</h1>
        <div class="search-container">
            <button class="btn-geo" onclick="getGPSLocation()">📍 내 위치</button>
            <input type="text" id="stationInput" placeholder="측정소 또는 동네 이름을 입력하세요">
            <button class="btn-main" onclick="startAnalysis()">분석 시작</button>
        </div>
    </section>

    <div class="dashboard" id="dashboard">
        <div class="card full-width" style="border-color: var(--accent);">
            <div style="font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; letter-spacing: 0.1em;">AI 분석 리포트</div>
            <div id="aiMsg" class="ai-message">분석 데이터를 기다리는 중입니다...</div>
        </div>

        <div class="card">
            <h2 id="verdictTitle" style="font-family:'Gowun Batang'; margin-bottom: 20px;">측정소 정보</h2>
            <div class="stat-grid">
                <div class="stat-item">
                    <span class="stat-val" id="pm25Val">—</span>
                    <span class="stat-lbl">초미세먼지(PM2.5)</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="tempVal">—</span>
                    <span class="stat-lbl">현재 기온</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-family:'Gowun Batang'; margin-bottom: 20px;">기상 디테일</h2>
            <div id="weatherInfo" style="line-height: 2;">
                </div>
        </div>
    </div>
</main>

<script>
/**
 * ──────────────────────────────────────────────────────────────────────────
 * CONFIG & SECURITY (주의: 실제 배포 시 백엔드로 이동 권장)
 * ──────────────────────────────────────────────────────────────────────────
 */
const API_KEY = "YOUR_ENCODED_API_KEY"; // 공공데이터포털 인코딩 키
const CLAUDE_API_KEY = "YOUR_CLAUDE_KEY"; // Claude API 키 (프록시 서버 권장)

/**
 * ──────────────────────────────────────────────────────────────────────────
 * 1. GPS & 좌표 변환 로직 (기상청 Lambert 변환)
 * ──────────────────────────────────────────────────────────────────────────
 */
function dfs_xy_conv(code, v1, v2) {
    const RE = 6371.00877; // 지구 반지름(km)
    const GRID = 5.0; // 격자 간격(km)
    const SLAT1 = 30.0; // 투영 위도1(degree)
    const SLAT2 = 60.0; // 투영 위도2(degree)
    const OLON = 126.0; // 기준점 경도(degree)
    const OLAT = 38.0; // 기준점 위도(degree)
    const XO = 43; // 기준점 X좌표(GRID)
    const YO = 136; // 기준점 Y좌표(GRID)

    const DEGRAD = Math.PI / 180.0;
    const re = RE / GRID;
    const slat1 = SLAT1 * DEGRAD;
    const slat2 = SLAT2 * DEGRAD;
    const olon = OLON * DEGRAD;
    const olat = OLAT * DEGRAD;

    let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
    sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
    let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
    sf = Math.pow(sf, sn) * Math.cos(slat1) / sn;
    let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
    ro = re * sf / Math.pow(ro, sn);
    
    let rs = {};
    if (code === "toXY") {
        rs['lat'] = v1; rs['lng'] = v2;
        let ra = Math.tan(Math.PI * 0.25 + (v1) * DEGRAD * 0.5);
        ra = re * sf / Math.pow(ra, sn);
        let theta = v2 * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI;
        if (theta < -Math.PI) theta += 2.0 * Math.PI;
        theta *= sn;
        rs['x'] = Math.floor(ra * Math.sin(theta) + XO + 0.5);
        rs['y'] = Math.floor(ro - ra * Math.cos(theta) + YO + 0.5);
    }
    return rs;
}

// GPS 위치 가져오기
function getGPSLocation() {
    if (!navigator.geolocation) return alert("GPS를 지원하지 않는 브라우저입니다.");
    
    document.getElementById('loading').style.display = 'flex';
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        const grid = dfs_xy_conv("toXY", latitude, longitude);
        
        // 카카오 또는 공공데이터 API를 사용하여 위경도 -> 근처 측정소명 찾기
        // 여기서는 예시로 가장 가까운 측정소 리스트 API 호출
        try {
            const stationName = await fetchNearestStation(latitude, longitude);
            document.getElementById('stationInput').value = stationName;
            startAnalysis(grid);
        } catch (e) {
            console.error(e);
            document.getElementById('loading').style.display = 'none';
        }
    }, () => {
        alert("위치 권한을 허용해주세요.");
        document.getElementById('loading').style.display = 'none';
    });
}

/**
 * ──────────────────────────────────────────────────────────────────────────
 * 2. API 데이터 호출부 (Encapsulated)
 * ──────────────────────────────────────────────────────────────────────────
 */

// 근처 측정소 찾기 (TM 좌표계 변환 필요 - 간략화 버전)
async function fetchNearestStation(lat, lng) {
    // 실제로는 위경도를 TM좌표로 변환 후 getNearbyMsrstnList API를 호출해야 합니다.
    // 여기서는 가장 대중적인 측정소 매핑 서비스를 가정합니다.
    return "종로구"; // 데모용 고정값 (실제 구현 시 API 연동)
}

async function fetchAirQuality(station) {
    const url = `https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty?serviceKey=${API_KEY}&returnType=json&numOfRows=1&stationName=${encodeURIComponent(station)}&dataTerm=DAILY&ver=1.3`;
    const res = await fetch(url);
    const data = await res.json();
    return data.response.body.items[0];
}

async function fetchWeather(grid) {
    const now = new Date();
    const baseDate = now.toISOString().slice(0,10).replace(/-/g, '');
    // 기상청 baseTime 로직 (3시간 단위 등 예외처리 필요)
    const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${API_KEY}&pageNo=1&numOfRows=100&dataType=JSON&base_date=${baseDate}&base_time=0500&nx=${grid.x}&ny=${grid.y}`;
    const res = await fetch(url);
    const data = await res.json();
    return data.response.body.items.item;
}

/**
 * ──────────────────────────────────────────────────────────────────────────
 * 3. 통합 분석 실행
 * ──────────────────────────────────────────────────────────────────────────
 */
async function startAnalysis(passedGrid = null) {
    const station = document.getElementById('stationInput').value;
    if (!station) return alert("측정소 또는 지역명을 입력하세요.");

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';
    document.getElementById('loadingText').textContent = "실시간 데이터를 수집하는 중...";

    try {
        const grid = passedGrid || { x: 60, y: 127 }; // 입력 시 기본 격자
        const air = await fetchAirQuality(station);
        const weather = await fetchWeather(grid);
        
        renderData(air, weather);
        await renderAI(air, weather);

    } catch (err) {
        console.error(err);
        alert("데이터를 가져오는 중 오류가 발생했습니다.");
    } finally {
        loading.style.display = 'none';
        document.getElementById('dashboard').style.display = 'grid';
    }
}

function renderData(air, weather) {
    const pm25 = air.pm25Value;
    const pm10 = air.pm10Value;
    const temp = weather.find(i => i.category === 'TMP')?.fcstValue;
    const reh = weather.find(i => i.category === 'REH')?.fcstValue;

    document.getElementById('pm25Val').textContent = `${pm25}㎍/㎥`;
    document.getElementById('tempVal').textContent = `${temp}°C`;
    document.getElementById('verdictTitle').textContent = `${air.stationName} 측정소`;
    
    document.getElementById('weatherInfo').innerHTML = `
        • 미세먼지(PM10): ${pm10}㎍/㎥ <br>
        • 습도: ${reh}% <br>
        • 오존: ${air.o3Value}ppm <br>
        • 데이터 기준: ${air.dataTime}
    `;

    // 등급별 테마 색상 변경
    const color = pm25 <= 15 ? '#4ade80' : pm25 <= 35 ? '#facc15' : '#f97316';
    document.getElementById('orb1').style.background = color;
    document.getElementById('pm25Val').style.color = color;
}

async function renderAI(air, weather) {
    const aiMsgEl = document.getElementById('aiMsg');
    aiMsgEl.classList.add('ai-typing');
    aiMsgEl.textContent = "AI가 오늘의 공기를 분석하고 있습니다...";

    const prompt = `측정소: ${air.stationName}, 초미세먼지: ${air.pm25Value}, 미세먼지: ${air.pm10Value}, 기온: ${weather.find(i => i.category === 'TMP')?.fcstValue}도. 
    이 데이터를 바탕으로 외출 여부와 마스크 착용, 환기 여부를 3문장으로 조언해줘. 다정하지만 전문적인 어조로.`;

    try {
        // 실제 운영 시 프록시 서버를 통해 호출해야 합니다.
        // 예시용 가상 응답 타이핑 효과
        const mockResponse = `현재 ${air.stationName}의 초미세먼지 농도는 ${air.pm25Value}㎍/㎥로 다소 높은 편입니다. 외출 시에는 반드시 KF80 이상의 마스크를 착용하시고, 노약자나 호흡기가 예민하신 분들은 야외 활동 시간을 줄이는 것이 좋겠습니다. 실내 환기는 미세먼지가 조금 더 잦아든 오후 시간대로 미루는 것을 추천드려요.`;
        
        let i = 0;
        aiMsgEl.textContent = "";
        const timer = setInterval(() => {
            if (i < mockResponse.length) {
                aiMsgEl.textContent += mockResponse[i++];
            } else {
                clearInterval(timer);
                aiMsgEl.classList.remove('ai-typing');
            }
        }, 30);

    } catch (e) {
        aiMsgEl.textContent = "AI 분석 서비스를 일시적으로 이용할 수 없습니다.";
    }
}
</script>
</body>
</html>
