<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨결 Pro — 스마트 외출 가이드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --good: #4ade80; --moderate: #facc15; --bad: #f97316; --very-bad: #ef4444;
            --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235;
            --border: rgba(255,255,255,0.07); --text: #f1f5f9; --muted: #64748b; --accent: #38bdf8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* Orb Animation */
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(130px); opacity: 0.12; pointer-events: none; transition: background 2s ease; z-index: 0; }
        .orb1 { width: 700px; height: 700px; top: -250px; left: -200px; background: var(--accent); }
        .orb2 { width: 450px; height: 450px; bottom: 50px; right: -150px; background: #818cf8; }

        header { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 18px 40px; border-bottom: 1px solid var(--border); backdrop-filter: blur(15px); background: rgba(10,14,26,0.7); }
        .logo { font-family: 'Gowun Batang', serif; font-size: 1.5rem; letter-spacing: 0.1em; }
        .logo span { color: var(--accent); }

        main { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
        
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-family: 'Gowun Batang', serif; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 15px; font-weight: 400; }
        
        .search-container { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px; display: flex; gap: 8px; max-width: 600px; margin: 0 auto 20px; }
        .search-container input { flex: 1; background: transparent; border: none; padding: 12px 20px; color: var(--text); font-size: 1rem; outline: none; }
        .btn-geo { background: rgba(56,189,248,0.1); border: 1px solid var(--accent); color: var(--accent); border-radius: 14px; padding: 0 15px; cursor: pointer; font-size: 0.8rem; white-space: nowrap; }
        .btn-main { background: var(--accent); color: #0a0e1a; border: none; border-radius: 14px; padding: 12px 25px; font-weight: 700; cursor: pointer; transition: transform 0.2s; white-space: nowrap; }
        .btn-main:active { transform: scale(0.96); }

        /* Dashboard Components */
        .dashboard { display: none; grid-template-columns: 1.5fr 1fr; gap: 20px; animation: fadeIn 0.8s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 30px; }
        .full-width { grid-column: 1 / -1; }
        
        .ai-message { font-family: 'Gowun Batang', serif; font-size: 1.2rem; line-height: 1.8; color: #e2e8f0; }
        .ai-typing::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 18px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-family: 'Gowun Batang', serif; display: block; }
        .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 5px; }

        /* Loading */
        #loading { display: none; position: fixed; inset: 0; background: rgba(10,14,26,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 850px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="bg-orb orb1" id="orb1"></div>
<div class="bg-orb orb2"></div>

<div id="loading">
    <div class="spinner"></div>
    <p id="loadingText" style="font-family:'Gowun Batang';">실시간 데이터를 수집하는 중...</p>
</div>

<header>
    <div class="logo">숨결<span>.</span></div>
    <div id="connectionStatus" style="font-size: 0.7rem; color: var(--good);">● System Online</div>
</header>

<main>
    <section class="hero">
        <h1>오늘, <em>나가도</em> 될까요?</h1>
        <div class="search-container">
            <button class="btn-geo" onclick="getGPSLocation()">📍 내 위치</button>
            <input type="text" id="stationInput" placeholder="측정소 또는 동네 이름을 입력하세요">
            <button class="btn-main" onclick="startAnalysis()">분석 시작</button>
        </div>
    </section>

    <div class="dashboard" id="dashboard">
        <div class="card full-width" style="border-color: var(--accent);">
            <div id="apiSourceTag" style="display: inline-block; padding: 4px 10px; background: rgba(56,189,248,0.1); color: var(--accent); border-radius: 10px; font-size: 0.7rem; margin-bottom: 12px; letter-spacing: 0.05em;">AI 분석 리포트</div>
            <div id="aiMsg" class="ai-message">분석 데이터를 기다리는 중입니다...</div>
        </div>

        <div class="card">
            <h2 id="verdictTitle" style="font-family:'Gowun Batang'; margin-bottom: 20px;">측정소 정보</h2>
            <div class="stat-grid">
                <div class="stat-item">
                    <span class="stat-val" id="pm25Val">—</span>
                    <span class="stat-lbl">초미세먼지(PM2.5)</span>
                </div>
                <div class="stat-item">
                    <span class="stat-val" id="tempVal">—</span>
                    <span class="stat-lbl">현재 기온</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="font-family:'Gowun Batang'; margin-bottom: 20px;">기상 디테일</h2>
            <div id="weatherInfo" style="line-height: 2;">
                </div>
        </div>
    </div>
</main>

<script>
/**
 * ──────────────────────────────────────────────────────────────────────────
 * CONFIG: OWM API 키를 입력해주세요. 공공데이터 키는 api 폴더의 백엔드 파일에 넣습니다.
 * ──────────────────────────────────────────────────────────────────────────
 */
const OWM_API_KEY = const OWM_API_KEY = "68be8e3e30b8d79dca72993923055020"; 
; // 반드시 실제 키로 변경하세요!

let currentLat = 37.5665; // 기본 위도 (서울 시청)
let currentLon = 126.9780; // 기본 경도 (서울 시청)

// Enter 키로 검색 실행
document.getElementById('stationInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') startAnalysis();
});

// GPS 위치 가져오기
function getGPSLocation() {
    if (!navigator.geolocation) return alert("GPS를 지원하지 않는 브라우저입니다.");
    
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loadingText').textContent = "위치 확인 중...";
    
    navigator.geolocation.getCurrentPosition((pos) => {
        currentLat = pos.coords.latitude;
        currentLon = pos.coords.longitude;
        
        // 예시용 동네 이름 할당
        document.getElementById('stationInput').value = "현재 위치"; 
        startAnalysis();
    }, () => {
        alert("위치 권한을 허용해주세요.");
        document.getElementById('loading').style.display = 'none';
    });
}

// 기상청 API용 기준 시간(base_time) 계산 함수
function getKmaBaseDateTime() {
    const now = new Date();
    let year = now.getFullYear();
    let month = now.getMonth() + 1;
    let date = now.getDate();
    let hours = now.getHours();

    const baseHours = [2, 5, 8, 11, 14, 17, 20, 23];
    let targetHour = baseHours.reverse().find(h => h <= hours);

    if (targetHour === undefined) {
        now.setDate(now.getDate() - 1);
        year = now.getFullYear();
        month = now.getMonth() + 1;
        date = now.getDate();
        targetHour = 23;
    }

    const pad = (n) => String(n).padStart(2, '0');
    return { baseDate: `${year}${pad(month)}${pad(date)}`, baseTime: `${pad(targetHour)}00` };
}

// 대기질 가져오기 (Main: 공공데이터 -> Fallback: OWM)
async function fetchAirQuality(station) {
    try {
        const res = await fetch(`/api/air?station=${encodeURIComponent(station)}`);
        if (!res.ok) throw new Error("서버 에러");
        const data = await res.json();
        
        if (data.response?.header?.resultCode !== "00") throw new Error("데이터 오류");
        
        const item = data.response.body.items[0];
        return {
            source: "한국환경공단 에어코리아",
            stationName: item.stationName,
            pm25Value: item.pm25Value,
            pm10Value: item.pm10Value,
            o3Value: item.o3Value,
            dataTime: item.dataTime
        };
    } catch (err) {
        console.warn("에어코리아 호출 실패, OpenWeatherMap으로 대체합니다.", err);
        const url = `https://api.openweathermap.org/data/2.5/air_pollution?lat=${currentLat}&lon=${currentLon}&appid=${OWM_API_KEY}`;
        const res = await fetch(url);
        const data = await res.json();
        const pm = data.list[0].components;
        
        return {
            source: "OpenWeatherMap 글로벌 데이터",
            stationName: station === "현재 위치" ? "현재 위치" : station + " (글로벌 예측)",
            pm25Value: pm.pm2_5,
            pm10Value: pm.pm10,
            o3Value: pm.o3 || "-",
            dataTime: new Date().toLocaleTimeString()
        };
    }
}

// 날씨 가져오기 (Main: 공공데이터 -> Fallback: OWM)
async function fetchWeather() {
    try {
        // 좌표 변환 간략화를 위해 임시 고정 격자 사용 (종로구)
        const { baseDate, baseTime } = getKmaBaseDateTime();
        const res = await fetch(`/api/weather?nx=60&ny=127&base_date=${baseDate}&base_time=${baseTime}`);
        if (!res.ok) throw new Error("서버 에러");
        const data = await res.json();
        
        if (data.response?.header?.resultCode !== "00") throw new Error("데이터 오류");
        return data.response.body.items.item;
    } catch (err) {
        console.warn("기상청 호출 실패, OpenWeatherMap으로 대체합니다.", err);
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${currentLat}&lon=${currentLon}&appid=${OWM_API_KEY}&units=metric`;
        const res = await fetch(url);
        const data = await res.json();
        
        return [
            { category: 'TMP', fcstValue: data.main.temp },
            { category: 'REH', fcstValue: data.main.humidity }
        ];
    }
}

async function startAnalysis() {
    const station = document.getElementById('stationInput').value.trim();
    if (!station) return alert("측정소 또는 지역명을 입력하세요.");

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';
    document.getElementById('loadingText').textContent = "실시간 데이터를 수집하는 중...";

    try {
        const air = await fetchAirQuality(station);
        const weather = await fetchWeather();
        
        renderData(air, weather);
        await renderAI(air, weather);

    } catch (err) {
        console.error(err);
        alert("데이터를 가져오는 데 실패했습니다. 네트워크 상태를 확인해주세요.");
    } finally {
        loading.style.display = 'none';
        document.getElementById('dashboard').style.display = 'grid';
    }
}

function renderData(air, weather) {
    const pm25 = parseFloat(air.pm25Value) || 0;
    const pm10 = parseFloat(air.pm10Value) || 0;
    const temp = weather.find(i => i.category === 'TMP')?.fcstValue || "-";
    const reh = weather.find(i => i.category === 'REH')?.fcstValue || "-";

    document.getElementById('pm25Val').textContent = `${pm25}㎍/㎥`;
    document.getElementById('tempVal').textContent = `${temp}°C`;
    document.getElementById('verdictTitle').textContent = air.stationName;
    document.getElementById('apiSourceTag').textContent = `AI 분석 리포트 (기반: ${air.source})`;
    
    document.getElementById('weatherInfo').innerHTML = `
        • 미세먼지(PM10): ${pm10}㎍/㎥ <br>
        • 습도: ${reh}% <br>
        • 오존: ${air.o3Value || "-"}ppm <br>
        • 데이터 기준: ${air.dataTime || new Date().toLocaleTimeString()}
    `;

    const color = pm25 <= 15 ? '#4ade80' : pm25 <= 35 ? '#facc15' : '#f97316';
    document.getElementById('orb1').style.background = color;
    document.getElementById('pm25Val').style.color = color;
}

async function renderAI(air, weather) {
    const aiMsgEl = document.getElementById('aiMsg');
    aiMsgEl.classList.add('ai-typing');
    aiMsgEl.textContent = "AI가 오늘의 공기를 분석하고 있습니다...";

    const pm25 = parseFloat(air.pm25Value) || 0;
    const temp = weather.find(i => i.category === 'TMP')?.fcstValue || "-";
    
    let advice = "야외 활동을 즐기기에 좋은 날씨입니다.";
    if (pm25 > 35) advice = "외출 시 KF80 이상의 마스크 착용을 권장하며, 무리한 실외 활동은 자제하세요.";
    if (pm25 > 75) advice = "대기질이 매우 좋지 않습니다. 가급적 외출을 삼가고 실내에 머무르세요.";

    const mockResponse = `현재 ${air.stationName}의 초미세먼지는 ${air.pm25Value}㎍/㎥입니다. 현재 기온은 ${temp}°C 이며, ${advice}`;
    
    let i = 0;
    aiMsgEl.textContent = "";
    const timer = setInterval(() => {
        if (i < mockResponse.length) {
            aiMsgEl.textContent += mockResponse[i++];
        } else {
            clearInterval(timer);
            aiMsgEl.classList.remove('ai-typing');
        }
    }, 30);
}
</script>
</body>
</html>
