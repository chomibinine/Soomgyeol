<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>숨결 Pro — 프리미엄 지능형 가이드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --good: #10b981; --moderate: #f59e0b; --bad: #f97316; --very-bad: #ef4444;
    --bg: #09090b; --surface: rgba(24, 24, 27, 0.65); --surface-hover: rgba(39, 39, 42, 0.8);
    --border: rgba(255, 255, 255, 0.08); --border-light: rgba(255, 255, 255, 0.15);
    --text-main: #f8fafc; --text-muted: #94a3b8;
    --accent: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.2);
    --font-sans: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    --font-serif: 'Gowun Batang', serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text-main); font-family: var(--font-sans); min-height: 100vh; overflow-x: hidden; line-height: 1.5; }

  .bg-orb { position: fixed; border-radius: 50%; filter: blur(140px); opacity: 0.15; pointer-events: none; transition: background 2s ease; z-index: 0; }
  .orb1 { width: 600px; height: 600px; top: -150px; left: -150px; background: var(--accent); animation: float 15s infinite alternate; }
  .orb2 { width: 500px; height: 500px; bottom: -100px; right: -150px; background: #818cf8; animation: float 20s infinite alternate-reverse; }
  @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

  header { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: rgba(9, 9, 11, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .logo { font-family: var(--font-serif); font-size: 1.4rem; letter-spacing: 0.1em; font-weight: 700; color: #fff; }
  .logo span { color: var(--accent); }
  .live-pill { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 6px 14px; border-radius: 100px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); animation: pulse 2s infinite; box-shadow: 0 0 8px var(--good); }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  main { position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; padding: 48px 20px 100px; }

  .hero { text-align: center; margin-bottom: 56px; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  .hero h1 { font-family: var(--font-serif); font-size: clamp(2.4rem, 6vw, 3.8rem); line-height: 1.2; margin-bottom: 16px; font-weight: 400; color: #fff; }
  .hero h1 em { font-style: normal; color: transparent; background: linear-gradient(135deg, var(--accent), #818cf8); -webkit-background-clip: text; background-clip: text; }
  .hero p { font-size: 1.05rem; color: var(--text-muted); max-width: 480px; margin: 0 auto 40px; font-weight: 300; }

  .search-wrapper { position: relative; max-width: 540px; margin: 0 auto; display: flex; align-items: center; background: rgba(24, 24, 27, 0.8); border: 1px solid var(--border-light); border-radius: 100px; padding: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .location-input { flex: 1; background: transparent; border: none; padding: 14px 24px; color: var(--text-main); font-size: 1rem; outline: none; text-align: center; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #2563eb); color: #fff; border: none; border-radius: 100px; padding: 14px 28px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); }

  .profile-section { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
  .chip { background: rgba(255,255,255,0.03); padding: 8px 18px; border-radius: 100px; border: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); cursor: pointer; transition: all 0.3s ease; }
  .chip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  .dashboard { display: none; flex-direction: column; gap: 20px; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
  .dashboard.visible { display: flex; }

  /* AI Card & Stealth Tip Box */
  .ai-card { position: relative; background: var(--surface); border-radius: 24px; padding: 32px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  .ai-badge { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
  .ai-badge::before { content: ''; width: 24px; height: 2px; background: var(--accent); border-radius: 2px; }
  .ai-message { font-family: var(--font-serif); font-size: 1.25rem; line-height: 1.8; color: #fff; margin-bottom: 24px; }
  
  /* Stealth Tip Style */
  .stealth-tip { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; animation: fadeIn 1s ease both; }
  .tip-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-bottom: 8px; display: block; }
  .tip-text { font-size: 0.95rem; color: #e2e8f0; line-height: 1.6; margin-bottom: 12px; display: block; }
  .tip-link { display: inline-flex; align-items: center; gap: 8px; background: #fff; color: #000; padding: 10px 20px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; text-decoration: none; transition: transform 0.2s; }
  .tip-link:active { transform: scale(0.96); }
  .disclosure { font-size: 0.65rem; color: var(--text-muted); margin-top: 12px; display: block; opacity: 0.6; }

  /* Other components... */
  .glass { background: var(--surface); backdrop-filter: blur(24px); border: 1px solid var(--border); }
  .verdict-card { text-align: center; padding: 48px 24px; border-radius: 32px; position: relative; overflow: hidden; }
  .verdict-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--verdict-color, #4ade80); transition: background 1s; }
  .verdict-location { font-size: 1rem; color: var(--accent); margin-bottom: 16px; background: var(--accent-glow); display: inline-block; padding: 6px 16px; border-radius: 100px; }
  .verdict-title { font-family: var(--font-serif); font-size: 2.8rem; margin-bottom: 12px; font-weight: 700; }
  
  .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-top: 24px; }
  .data-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 24px 16px; border-radius: 24px; text-align: center; }
  .data-val { font-size: 2rem; font-family: var(--font-serif); font-weight: 700; color: #fff; }
  .data-lbl { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }

  #loading { display: none; position: fixed; inset: 0; background: rgba(9,9,11,0.95); backdrop-filter: blur(20px); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
  .loader { width: 40px; height: 40px; border: 3px solid var(--border-light); border-radius: 50%; border-bottom-color: var(--accent); animation: rotation 1s linear infinite; }
  @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(24, 24, 27, 0.9); border: 1px solid var(--border-light); border-radius: 100px; padding: 12px 24px; font-size: 0.9rem; color: #fff; z-index: 2000; transition: all 0.4s; opacity: 0; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.75rem; opacity: 0.6; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="bg-orb orb1" id="orb1"></div>
<div class="bg-orb orb2" id="orb2"></div>

<div id="loading">
  <div class="loader"></div>
  <p style="margin-top:20px; font-family:var(--font-serif);">대기를 정밀 스캔하고 있습니다...</p>
</div>

<div class="toast" id="toast">ℹ️ 메시지</div>

<header>
  <div class="logo">숨결<span>.</span></div>
  <div class="live-pill"><div class="live-dot"></div><span>하이브리드 지능형 분석</span></div>
</header>

<main>
  <section class="hero">
    <h1>오늘, <em>나가도</em> 될까요?</h1>
    <p>당신의 건강 조건에 맞춘 실시간 정밀 코칭을 시작합니다.</p>
    <div class="search-wrapper">
      <input class="location-input" id="locationInput" type="text" placeholder="분석할 지역명을 입력하세요">
      <button class="btn-primary" onclick="forceAnalysis()">스캔 시작</button>
    </div>
    <div class="profile-section">
      <div class="chip" onclick="toggleChip(this)" data-val="천식">🫁 천식</div>
      <div class="chip" onclick="toggleChip(this)" data-val="알레르기">🌿 알레르기</div>
      <div class="chip" onclick="toggleChip(this)" data-val="영유아">👶 영유아</div>
      <div class="chip" onclick="toggleChip(this)" data-val="고령자">🧓 고령자</div>
      <div class="chip" onclick="toggleChip(this)" data-val="운동">🏃 야외 운동</div>
    </div>
  </section>

  <section class="dashboard" id="dashboard">
    <div class="ai-card">
      <div class="ai-badge">AI 정밀 건강 리포트</div>
      <div id="aiMessage" class="ai-message"></div>
      
      <div id="stealthTipBox" class="stealth-tip" style="display: none;">
        <span class="tip-label">💡 오늘의 건강 관리 팁</span>
        <span id="tipText" class="tip-text"></span>
        <a id="tipLink" href="#" target="_blank" class="tip-link">자세히 보기 ➔</a>
        <span class="disclosure">✱ 이 포스팅은 토스쇼핑 쉐어링크 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다.</span>
      </div>
    </div>

    <div class="verdict-card glass" id="verdictCard">
      <div class="verdict-location" id="verdictLocation">📍 위치 분석 중</div>
      <div class="verdict-title" id="verdictTitle">분석 중...</div>
      <div class="data-grid">
        <div class="data-item"><div class="data-lbl">미세먼지</div><div class="data-val" id="pm10Val">—</div></div>
        <div class="data-item"><div class="data-lbl">초미세먼지</div><div class="data-val" id="pm25Val">—</div></div>
        <div class="data-item"><div class="data-lbl">오존(ppm)</div><div class="data-val" id="o3Val">—</div></div>
      </div>
    </div>

    <div class="data-grid" id="weatherRow"></div>
  </section>
</main>

<footer>
  <p>숨결 Pro · 상용 수준의 정밀 대기질 분석 엔진</p>
</footer>

<script>
const VWORLD_API_KEY = "5B0D3660-9AA8-3DEC-BDB4-BE8463D07762"; 
const OWM_API_KEY = "68be8e3e30b8d79dca72993923055020";

// 토스 쉐어링크 데이터베이스
const SHARE_LINKS = {
  mask: { text: "오늘 같은 대기질에는 미세입자를 94% 이상 차단하는 보건용 마스크 착용이 필수입니다.", url: "https://toss.im/_m/ZojT3Vue" },
  umbrella: { text: "갑작스러운 비나 강한 자외선에 대비해 가방에 가볍게 들어가는 3단 우산을 챙기세요.", url: "https://toss.im/_m/7aasAWUq" },
  sunscreen: { text: "오존과 자외선이 강한 날입니다. 피부 보호를 위해 외출 전 무기자차 차단제를 꼭 발라주세요.", url: "https://toss.im/_m/TNF5g4Wv" },
  pear: { text: "알레르기 예방과 기관지 건강을 위해 도라지 배즙으로 수분을 보충하는 것을 권장합니다.", url: "https://toss.im/_m/XpRgVJI5" },
  wipes: { text: "아이와 외출 시 위생 관리를 위해 부드럽고 도톰한 저자극 물티슈를 미리 챙겨주세요.", url: "https://toss.im/_m/NlTgyKty" },
  warmer: { text: "야외 운동 시 자외선으로부터 피부를 보호하고 호흡이 편한 넥워머를 활용해 보세요.", url: "https://toss.im/_m/vBYMH07c" }
};

let currentLat = 36.4800; let currentLon = 127.2890;
let selectedConditions = []; let lastLocation = '세종시';

window.addEventListener('DOMContentLoaded', () => { startAutoAnalysis(); });

async function safeFetch(url, timeoutMs = 5000) {
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeoutMs);
    try {
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(id); return await res.json();
    } catch(e) { clearTimeout(id); throw e; }
}

async function startAutoAnalysis() {
    document.getElementById('loading').style.display = 'flex'; 
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            async (pos) => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; await processAllData(); },
            async () => { await processAllData(); }, { timeout: 6000 }
        );
    } else await processAllData();
}

async function forceAnalysis() {
    const input = document.getElementById('locationInput').value.trim();
    if(input) lastLocation = input;
    document.getElementById('loading').style.display = 'flex';
    await processAllData(true);
}

async function processAllData(isManual = false) {
    const loading = document.getElementById('loading');
    try {
        if(!isManual) {
            const geo = await safeFetch(`https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${currentLon},${currentLat}&format=json&type=both&zipcode=false&simple=false&key=${VWORLD_API_KEY}`, 3000);
            if(geo.response?.status === "OK") lastLocation = geo.response.result[0].structure.level4L || geo.response.result[0].structure.level2 || "현재 위치";
        }
        document.getElementById('locationInput').value = lastLocation;

        const aData = await safeFetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${currentLat}&lon=${currentLon}&appid=${OWM_API_KEY}`);
        const c = aData.list[0].components;
        const air = { pm10: Math.round(c.pm10), pm25: Math.round(c.pm2_5), o3: (c.o3 / 1000).toFixed(3), stationName: lastLocation };

        const wData = await safeFetch(`https://api.openweathermap.org/data/2.5/weather?lat=${currentLat}&lon=${currentLon}&appid=${OWM_API_KEY}&units=metric`);
        const weather = { temp: Math.round(wData.main.temp), humidity: Math.round(wData.main.humidity), windSpeed: Math.round(wData.wind.speed), ptyCode: (wData.weather[0].main || "").includes("Rain") ? 1 : 0, skyCode: wData.clouds.all > 50 ? 4 : 1, rainProb: wData.clouds.all || 0 };

        renderDashboard(air, weather);
    } catch(err) { showToast("⚠️ 데이터를 불러오는 중 오류가 발생했습니다."); }
    finally { loading.style.display = 'none'; }
}

function renderDashboard(air, w) {
    const grade = air.pm25 <= 15 ? 'good' : air.pm25 <= 35 ? 'moderate' : air.pm25 <= 75 ? 'bad' : 'very-bad';
    const color = { good:'#10b981', moderate:'#f59e0b', bad:'#f97316', 'very-bad':'#ef4444' }[grade];
    
    document.getElementById('orb1').style.background = color;
    document.getElementById('verdictCard').style.setProperty('--verdict-color', color);
    document.getElementById('verdictLocation').innerHTML = `📍 ${air.stationName}`;
    document.getElementById('verdictTitle').textContent = { good:'나가도 좋습니다', moderate:'짧게 다녀오세요', bad:'실내에 머무세요', 'very-bad':'외출을 자제하세요' }[grade];

    document.getElementById('pm10Val').textContent = air.pm10;
    document.getElementById('pm25Val').textContent = air.pm25;
    document.getElementById('o3Val').textContent = air.o3;

    const skyIcons = ['', '☀️', '', '⛅', '☁️']; const ptyIcons = ['', '🌧️', '🌨️', '❄️', '⛈️'];
    const icon = w.ptyCode > 0 ? ptyIcons[w.ptyCode] : skyIcons[w.skyCode];
    document.getElementById('weatherRow').innerHTML = `
      <div class="data-item"><div class="data-lbl">기온</div><div class="data-val">${w.temp}°C</div><div style="margin-top:8px;">${icon}</div></div>
      <div class="data-item"><div class="data-lbl">습도</div><div class="data-val">${w.humidity}%</div><div style="margin-top:8px;">💧</div></div>
      <div class="data-item"><div class="data-lbl">풍속</div><div class="data-val">${w.windSpeed}</div><div style="font-size:0.8rem; color:var(--text-muted); margin-top:8px;">m/s</div></div>
      <div class="data-item"><div class="data-lbl">강수</div><div class="data-val">${w.rainProb}%</div><div style="margin-top:8px;">🌂</div></div>`;

    // AI Coaching & Stealth Tip Logic
    let baseMsg = "가벼운 산책을 즐기기에 아주 쾌적하고 완벽한 날씨예요!";
    if (air.pm25 > 35) baseMsg = "바깥 공기가 조금 탁하네요. 호흡기 보호를 위해 마스크를 착용하시는 것이 좋습니다.";
    if (air.pm25 > 75) baseMsg = "오늘 대기질이 매우 나쁩니다. 무리한 야외 활동은 피하고 실내에 머무세요.";
    let healthMsg = selectedConditions.length > 0 ? ` 특히 선택하신 [${selectedConditions.join(', ')}] 상황을 고려하여 세심한 건강 관리가 필요합니다.` : "";
    let aiText = `오늘 ${air.stationName}의 기온은 ${w.temp}°C, 초미세먼지는 ${air.pm25}㎍/㎥입니다. ${baseMsg}${healthMsg}`;

    const aiMsgEl = document.getElementById('aiMessage'); aiMsgEl.innerHTML = '';
    let aiIndex = 0;
    const aiTimer = setInterval(() => { if (aiIndex < aiText.length) aiMsgEl.innerHTML += aiText[aiIndex++]; else clearInterval(aiTimer); }, 35);

    // 상황별 상품 추천 노출
    const tipBox = document.getElementById('stealthTipBox');
    let recommendation = null;

    if (air.pm25 > 35) recommendation = SHARE_LINKS.mask;
    else if (w.ptyCode > 0 || w.humidity > 80) recommendation = SHARE_LINKS.umbrella;
    else if (selectedConditions.includes("천식") || selectedConditions.includes("알레르기")) recommendation = SHARE_LINKS.pear;
    else if (selectedConditions.includes("영유아")) recommendation = SHARE_LINKS.wipes;
    else if (selectedConditions.includes("운동")) recommendation = SHARE_LINKS.warmer;
    else if (air.o3 > 0.09 || w.skyCode === 1) recommendation = SHARE_LINKS.sunscreen;

    if (recommendation) {
        document.getElementById('tipText').textContent = recommendation.text;
        document.getElementById('tipLink').href = recommendation.url;
        tipBox.style.display = 'block';
    } else { tipBox.style.display = 'none'; }

    document.getElementById('dashboard').classList.add('visible');
}

function toggleChip(el) {
  const val = el.dataset.val;
  if (el.classList.contains('active')) { el.classList.remove('active'); selectedConditions = selectedConditions.filter(v => v !== val); }
  else { el.classList.add('active'); selectedConditions.push(val); }
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.innerHTML = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
